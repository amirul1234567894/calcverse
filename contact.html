<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact Us | CalcVerse</title>
  <meta name="description" content="Contact CalcVerse for feedback, suggestions, or support."/>
  <link rel="stylesheet" href="style.css"/>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml"/>
</head>
<body>
<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo"><div class="logo-mark">C</div><span class="logo-text">Calc<span>Verse</span></span></a>
    <nav class="site-nav"><a href="index.html">Home</a><a href="blog/index.html">Blog</a></nav>
  </div>
</header>
<!-- Adsterra Top Banner (728x90 desktop) -->
<div class="ad-container ad-728x90">
  <div id="adsterra-728x90"></div>
</div>

<main>
  <div class="tool-page" style="max-width:600px">
    <div class="tool-header">
      <h1>Contact Us</h1>
      <p>Have a question, suggestion, or found a bug? We'd love to hear from you.</p>
    </div>
    <div class="calculator-widget">
      <form action="https://formspree.io/f/xjgjkqlr" method="POST">
        <div class="calc-inputs">
          <div class="input-group">
            <label for="name">Your Name</label>
            <input type="text" id="name" name="name" class="input-field" placeholder="John Doe" required/>
          </div>
          <div class="input-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="input-field" placeholder="john@example.com" required/>
          </div>
          <div class="input-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="5" class="input-field" placeholder="Your message..." required style="resize:vertical"></textarea>
          </div>
        </div>
        <button type="submit" class="calc-btn">Send Message</button>
      </form>
      <p style="text-align:center;color:var(--text2);font-size:0.85rem;margin-top:1rem">We usually reply within 24–48 hours.</p>
      <p style="text-align:center;color:var(--text2);font-size:0.9rem;margin-top:0.5rem">Or email us directly at <a href="mailto:hello@autoflowa.in" style="color:var(--accent);text-decoration:none">hello@autoflowa.in</a></p>
    </div>
  </div>

<!-- Adsterra In-Content (300x250) -->
<div class="ad-container ad-300x250">
  <span class="ad-label">Advertisement</span>
  <div id="adsterra-300x250"></div>
</div>
</main>
<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-brand"><div class="logo-mark" style="width:32px;height:32px;font-size:1rem">C</div><span>CalcVerse</span></div>
    <p class="footer-copy">© 2025 CalcVerse</p>
    <div class="footer-links"><a href="privacy.html">Privacy</a><a href="terms.html">Terms</a></div>
  </div>
</footer>
<script src="assets/ads/ads-loader.js" defer></script>

<!-- Adsterra Mobile Sticky (320x50) -->
<div class="ad-container ad-320x50 ad-320x50-sticky ad-mobile-only">
  <div id="adsterra-320x50"></div>
</div>
</body>
</html>
